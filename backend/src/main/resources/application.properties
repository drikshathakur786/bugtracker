# ?????????????????????????????????????????????
# APPLICATION
# ?????????????????????????????????????????????
spring.application.name=bugtracker

# ?????????????????????????????????????????????
# DATABASE ? PostgreSQL connection
# ?????????????????????????????????????????????

# The JDBC URL tells Spring where your PostgreSQL server is.
# Format: jdbc:postgresql://<host>:<port>/<database_name>
spring.datasource.url=jdbc:postgresql://localhost:5433/bugtracker_db

# The user you created in pgAdmin above
spring.datasource.username=bugtracker_user

# The password you set above
spring.datasource.password=Test1234

# This is the PostgreSQL JDBC driver class.
# Spring Boot can usually auto-detect this, but being explicit is good practice.
spring.datasource.driver-class-name=org.postgresql.Driver

# ?????????????????????????????????????????????
# JPA / HIBERNATE
# ?????????????????????????????????????????????

# DDL auto ? this controls whether Hibernate auto-creates/updates your tables.
# "update"  ? creates tables if they don't exist, adds new columns if you add them.
#             NEVER use this in production (use "validate" or Flyway migrations instead).
# "create"  ? drops and recreates all tables on startup ? dangerous, kills data.
# "none"    ? does nothing, you manage schema yourself.
# For learning: "update" is fine. We'll switch to "validate" in production.
spring.jpa.hibernate.ddl-auto=update

# The SQL dialect tells Hibernate which SQL flavour to generate.
# PostgreSQL 15 is the current major version.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Print every SQL query Hibernate runs to your console.
# This is INVALUABLE for debugging. You'll see exactly what queries JPA generates.
# Set to false in production ? it's very noisy.
spring.jpa.show-sql=true

# Makes the printed SQL readable with indentation instead of one long line.
spring.jpa.properties.hibernate.format_sql=true

# ?????????????????????????????????????????????
# SERVER
# ?????????????????????????????????????????????

# Your API will run at http://localhost:8080
server.port=8080

# All your API endpoints will be prefixed with /api
# e.g. /api/auth/login instead of /auth/login
# This is a best practice ? it namespaces your REST API cleanly.
server.servlet.context-path=/api

# ?????????????????????????????????????????????
# LOGGING
# ?????????????????????????????????????????????

# Show DEBUG logs for your own code, INFO for everything else.
# This means you'll see detailed logs for com.yourname.bugtracker but not for Spring internals.
logging.level.com.yourname.bugtracker=DEBUG
logging.level.org.springframework.security=DEBUG

# ?????????????????????????????????????????????
# JWT ? we'll use this when we implement auth
# ?????????????????????????????????????????????

# This is the secret key used to sign JWT tokens.
# IMPORTANT: In a real project, NEVER hardcode this. Use environment variables.
# For now, it's fine. We'll fix this before deployment.
app.jwt.secret=thisIsAVeryLongSecretKeyThatShouldBeAtLeast256BitsLongForHMACSHA256Security
app.jwt.expiration-ms=86400000
# 86400000 ms = 24 hours exactly